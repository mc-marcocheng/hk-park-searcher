site_name: Hong Kong Park Searcher
site_description: Documentation for Hong Kong Park Searcher, a community-maintained street workout park directory
site_url: https://mc-marcocheng.github.io/hk-park-searcher/docs/
repo_url: https://github.com/mc-marcocheng/hk-park-searcher
repo_name: mc-marcocheng/hk-park-searcher

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: docs/overrides
  font: false

  icon:
    logo: material/map-marker-radius

  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Data and images: data-and-images.md
  - Contribution system: contribution-system.md
  - Backend deployment: backend-deployment.md
  - Development: development.md
  - Security: security.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

  - pymdownx.inlinehilite

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js

extra:
  generator: false

strict: true
