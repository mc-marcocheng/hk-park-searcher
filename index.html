<!doctype html>
<html lang="zh-HK">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Apply the theme before rendering to avoid a flash -->
        <script>
            (() => {
                try {
                    const savedTheme = localStorage.getItem("park-theme");
                    const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
                        ? "dark"
                        : "light";

                    document.documentElement.dataset.theme = savedTheme || preferredTheme;
                } catch {
                    document.documentElement.dataset.theme = "light";
                }
            })();
        </script>

        <title>香港街健 | 公園搜尋</title>

        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛝</text></svg>"
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        <link rel="stylesheet" href="./css/park-searcher.css" />
    </head>

    <body>
        <div id="map" aria-label="香港街健公園地圖"></div>

        <div id="pin-indicator" role="status" aria-live="polite">
            <span aria-hidden="true">⌖</span>
            請在地圖上點擊以選擇位置
        </div>

        <main id="app-shell">
            <aside id="search-aside" class="glass-panel" aria-label="公園搜尋及結果">
                <header class="search-header border-b">
                    <div class="header-main">
                        <div class="brand-lockup">
                            <p class="brand-eyebrow">HK CALISTHENICS DIRECTORY</p>
                            <h1>
                                香港街健
                                <mark>公園</mark>
                            </h1>
                        </div>

                        <div class="header-actions">
                            <button
                                id="theme-toggle"
                                class="icon-button"
                                type="button"
                                aria-label="切換至深色模式"
                                title="切換至深色模式"
                            >
                                <span id="theme-icon" aria-hidden="true">☾</span>
                                <span id="theme-label" class="sr-only">切換至深色模式</span>
                            </button>

                            <a
                                href="https://forms.gle/tBqyQ5meYqtdXcja7"
                                target="_blank"
                                rel="noopener noreferrer"
                                class="submit-link"
                                title="提交公園資料（在新分頁開啟）"
                            >
                                <span aria-hidden="true">＋</span>
                                <span class="submit-label">提交資料</span>
                            </a>
                        </div>
                    </div>

                    <div id="search-controls" class="space-y-3">
                        <div class="search-field">
                            <label for="search-input" class="sr-only"
                                >搜尋公園、地區或英文名稱</label
                            >
                            <span class="search-field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <circle cx="11" cy="11" r="7" />
                                    <path d="m16.5 16.5 4 4" />
                                </svg>
                            </span>

                            <input
                                type="search"
                                id="search-input"
                                placeholder="搜尋公園或地區..."
                                autocomplete="off"
                            />
                        </div>

                        <div class="location-actions">
                            <button id="btn-geolocate" class="button-primary" type="button">
                                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <circle cx="12" cy="12" r="3" />
                                    <circle cx="12" cy="12" r="7" />
                                    <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
                                </svg>
                                附近公園
                            </button>

                            <button id="btn-drop-pin" class="button-tertiary" type="button">
                                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M19 10c0 5-7 11-7 11S5 15 5 10a7 7 0 1 1 14 0Z" />
                                    <circle cx="12" cy="10" r="2" />
                                </svg>
                                選擇位置
                            </button>
                        </div>
                    </div>

                    <div id="filter-container-wrapper">
                        <div id="filter-container" aria-label="按器材篩選" role="group"></div>
                    </div>
                </header>

                <section class="results-panel" aria-label="搜尋結果">
                    <div id="park-list"></div>
                    <div id="pagination" aria-live="polite"></div>
                </section>
            </aside>
        </main>

        <button
            id="mobile-view-toggle"
            type="button"
            aria-pressed="false"
            aria-controls="search-aside"
        >
            <span id="toggle-icon" aria-hidden="true">⌖</span>
            <span id="toggle-text">查看地圖</span>
        </button>

        <div
            id="park-modal"
            class="hidden"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modal-title"
        >
            <button
                type="button"
                class="modal-backdrop"
                onclick="closeModal()"
                aria-label="關閉公園詳情"
            ></button>

            <div class="modal-dialog glass-panel">
                <button
                    type="button"
                    class="modal-close"
                    onclick="closeModal()"
                    aria-label="關閉公園詳情"
                >
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M6 6l12 12M18 6 6 18" />
                    </svg>
                </button>

                <div id="modal-content"></div>
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script type="module" src="./js/app.js"></script>
    </body>
</html>
